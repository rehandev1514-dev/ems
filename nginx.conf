server {
  listen 80;
  server_name _;

  # Use Docker's embedded DNS server to resolve upstream hosts dynamically
  resolver 127.0.0.11 valid=30s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  # Serve static files (ensure index.html is never cached)
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires 0;
  }

  # Cache static assets
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Proxy API requests to the backend container
  location /api/ {
    set $upstream_backend backend;
    proxy_pass http://$upstream_backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # Proxy Socket.IO real-time connections
  location /socket.io/ {
    set $upstream_socket backend;
    proxy_pass http://$upstream_socket:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
  }
}